<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Examen Geografía Física</title>

<style>
body {font-family: Arial; background:#e8f5e9; padding:20px;}
.container {background:white; padding:20px; border-radius:10px; max-width:900px; margin:auto;}
.timer {color:red; font-size:20px; float:right;}
button {background:#4caf50; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;}
.correcta {color:green; font-weight:bold;}
.incorrecta {color:red; font-weight:bold;}
</style>
</head>

<body>

<div class="container" id="inicio">
<h2>Inicio del Examen</h2>
<input type="text" id="nombre" placeholder="Nombre completo"><br><br>
<input type="text" id="cuenta" placeholder="Número de cuenta"><br><br>
<button onclick="iniciar()">Comenzar</button>
</div>

<div class="container" id="quizContainer" style="display:none;">
<div class="timer" id="timer">01:05</div>
<div id="quiz"></div>
<button onclick="nextQuestion()">Siguiente</button>
</div>

<div class="container" id="resultado" style="display:none;"></div>

<script>

// ===== 50 PREGUNTAS DIFERENTES =====
const questions = [
{q:"¿Qué estudia la tectónica de placas?",a:["Clima","Movimiento de placas","Ríos","Vegetación"],correct:1},
{q:"¿Cuál es la capa más externa de la Tierra?",a:["Núcleo","Manto","Corteza","Astenosfera"],correct:2},
{q:"¿Qué científico propuso la deriva continental?",a:["Darwin","Wegener","Newton","Galileo"],correct:1},
{q:"¿Qué fenómeno produce los terremotos?",a:["Lluvia","Viento","Movimiento de placas","Sol"],correct:2},
{q:"¿Qué mide la escala Richter?",a:["Temperatura","Magnitud sísmica","Presión","Altitud"],correct:1},
{q:"¿Dónde se localiza el cinturón de fuego?",a:["Atlántico","Pacífico","Ártico","Índico"],correct:1},
{q:"¿Qué es una falla geológica?",a:["Río","Fractura terrestre","Montaña","Valle"],correct:1},
{q:"¿Qué capa terrestre es líquida?",a:["Corteza","Núcleo externo","Manto","Litosfera"],correct:1},
{q:"¿Qué tipo de roca se forma por magma?",a:["Sedimentaria","Ígnea","Metamórfica","Fósil"],correct:1},
{q:"¿Qué es una llanura?",a:["Elevación","Zona plana","Volcán","Océano"],correct:1},

{q:"¿Qué es una meseta?",a:["Zona baja","Superficie elevada plana","Montaña","Río"],correct:1},
{q:"¿Qué es un valle?",a:["Elevación","Depresión entre montañas","Volcán","Océano"],correct:1},
{q:"¿Qué es un volcán?",a:["Río","Abertura terrestre","Montaña","Valle"],correct:1},
{q:"¿Qué libera un volcán?",a:["Agua","Lava","Viento","Arena"],correct:1},
{q:"¿Qué causa los tsunamis?",a:["Viento","Sismos submarinos","Sol","Lluvia"],correct:1},
{q:"¿Qué es erosión?",a:["Formación","Desgaste","Elevación","Movimiento"],correct:1},
{q:"¿Qué es sedimentación?",a:["Desgaste","Depósito","Movimiento","Calor"],correct:1},
{q:"¿Qué forma el relieve?",a:["Clima","Procesos internos y externos","Vegetación","Animales"],correct:1},
{q:"¿Qué es el manto?",a:["Capa externa","Capa intermedia","Capa interna","Agua"],correct:1},
{q:"¿Qué es el núcleo?",a:["Centro terrestre","Superficie","Océano","Aire"],correct:0},

{q:"¿Qué es un sismo?",a:["Movimiento terrestre","Viento","Lluvia","Calor"],correct:0},
{q:"¿Qué es magnitud?",a:["Intensidad","Tamaño del sismo","Tiempo","Altura"],correct:1},
{q:"¿Qué es epicentro?",a:["Centro interno","Punto superficial","Montaña","Río"],correct:1},
{q:"¿Qué es hipocentro?",a:["Interior sismo","Superficie","Aire","Agua"],correct:0},
{q:"¿Qué país tiene alta sismicidad?",a:["México","Canadá","Brasil","Egipto"],correct:0},
{q:"¿Qué es relieve?",a:["Clima","Formas del terreno","Ríos","Aire"],correct:1},
{q:"¿Qué es altitud?",a:["Distancia mar","Tiempo","Clima","Peso"],correct:0},
{q:"¿Qué es latitud?",a:["Distancia ecuador","Altura","Tiempo","Presión"],correct:0},
{q:"¿Qué es longitud?",a:["Distancia Greenwich","Altura","Peso","Clima"],correct:0},
{q:"¿Qué es una cordillera?",a:["Montañas","Ríos","Valles","Mares"],correct:0},

{q:"¿Qué es una depresión?",a:["Elevación","Zona baja","Montaña","Río"],correct:1},
{q:"¿Qué es minería?",a:["Extracción recursos","Agricultura","Pesca","Industria"],correct:0},
{q:"¿Qué mineral es energético?",a:["Oro","Carbón","Plata","Cobre"],correct:1},
{q:"¿Qué mineral es precioso?",a:["Hierro","Oro","Carbón","Sal"],correct:1},
{q:"¿Qué mineral es industrial?",a:["Cobre","Agua","Aire","Sol"],correct:0},
{q:"¿Qué afecta el relieve a población?",a:["Nada","Distribución","Color","Clima"],correct:1},
{q:"¿Qué es una placa tectónica?",a:["Fragmento terrestre","Río","Aire","Agua"],correct:0},
{q:"¿Qué produce el movimiento divergente?",a:["Separación","Choque","Nada","Fusión"],correct:0},
{q:"¿Qué produce el movimiento convergente?",a:["Separación","Choque","Nada","Desgaste"],correct:1},
{q:"¿Qué produce el movimiento transformante?",a:["Deslizamiento","Choque","Separación","Nada"],correct:0},

{q:"¿Qué es magma?",a:["Roca fundida","Agua","Aire","Tierra"],correct:0},
{q:"¿Qué es lava?",a:["Magma exterior","Agua","Aire","Gas"],correct:0},
{q:"¿Qué es riesgo volcánico?",a:["Peligro volcán","Agua","Viento","Sol"],correct:0},
{q:"¿Qué es riesgo sísmico?",a:["Peligro sismo","Clima","Altura","Agua"],correct:0},
{q:"¿Qué zona es más sísmica en México?",a:["Centro","Pacífico","Norte","Este"],correct:1},
{q:"¿Qué continente tiene más volcanes?",a:["Asia","Oceanía","América","Europa"],correct:2},
{q:"¿Qué es la litosfera?",a:["Capa sólida","Aire","Agua","Fuego"],correct:0},
{q:"¿Qué es la astenosfera?",a:["Capa plástica","Sólida","Líquida","Gas"],correct:0},
{q:"¿Qué influye en economía?",a:["Relieve","Color","Forma","Tiempo"],correct:0},
{q:"¿Qué influye en población?",a:["Relieve","Nada","Color","Forma"],correct:0}
];

// ===== VARIABLES =====
let current=0, timer, timeLeft=65;
let respuestas=new Array(questions.length).fill(null);
let tiempos=new Array(questions.length).fill(0);
let inicioExamen, inicioPregunta;

// ===== INICIO =====
function iniciar(){
if(!nombre.value||!cuenta.value){alert("Completa los datos");return;}
inicioExamen=new Date();
inicio.style.display="none";
quizContainer.style.display="block";
loadQuestion();
}

// ===== CARGAR =====
function loadQuestion(){
inicioPregunta=Date.now();
quiz.innerHTML=`
<p><b>${current+1}. ${questions[current].q}</b></p>
${questions[current].a.map((opt,i)=>`
<label><input type="radio" name="q" value="${i}"> ${"ABCD"[i]}) ${opt}</label><br>
`).join("")}`;
resetTimer();
}

// ===== TIMER =====
function resetTimer(){
clearInterval(timer);
timeLeft=65;
timer=setInterval(()=>{
document.getElementById("timer").textContent=
`${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,"0")}`;
timeLeft--;
if(timeLeft<0){guardar();nextQuestion();}
},1000);
}

// ===== GUARDAR =====
function guardar(){
let sel=document.querySelector('input[name="q"]:checked');
respuestas[current]=sel?parseInt(sel.value):null;
tiempos[current]=Math.floor((Date.now()-inicioPregunta)/1000);
}

// ===== SIGUIENTE =====
function nextQuestion(){
guardar();
clearInterval(timer);
current++;
if(current<questions.length){loadQuestion();}
else finalizar();
}

// ===== FINAL =====
function finalizar(){
let total=Math.floor((new Date()-inicioExamen)/1000);
let correctas=0;
let letras=["A","B","C","D"];

let html=`<h2>Resultados</h2>
<p><b>Nombre:</b> ${nombre.value}</p>
<p><b>Cuenta:</b> ${cuenta.value}</p>
<p><b>Tiempo total:</b> ${total}s</p>`;

questions.forEach((q,i)=>{
let r=respuestas[i];
if(r===q.correct){correctas++;
html+=`<p class="correcta">${i+1}. ✔ Correcta | Tiempo: ${tiempos[i]}s</p>`;
}else{
html+=`<p class="incorrecta">${i+1}. ✘ Incorrecta | Tiempo: ${tiempos[i]}s</p>`;
}
});

let cal=(correctas/questions.length*10).toFixed(2);

html+=`<h3>Calificación: ${cal}</h3>
<button onclick="descargar()">Descargar</button>`;

resultado.innerHTML=html;
resultado.style.display="block";

// TEXTO SIN RESPUESTAS CORRECTAS
let texto=`Nombre: ${nombre.value}
Cuenta: ${cuenta.value}
Tiempo total: ${total}s
Calificación: ${cal}

Resultados:
`;

questions.forEach((q,i)=>{
texto+=`${i+1}. ${respuestas[i]!==null?letras[respuestas[i]]:"Sin responder"} | ${tiempos[i]}s\n`;
});

window.reporte=texto;
}

// ===== DESCARGAR =====
function descargar(){
let blob=new Blob([window.reporte],{type:"text/plain"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="resultado.txt";
a.click();
}

</script>

</body>
</html>
